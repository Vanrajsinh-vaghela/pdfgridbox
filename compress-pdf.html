<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compress PDF Online Free - pdfgridbox</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    
    <style>
        :root {
            --bg-main: #090d16; --bg-card: rgba(22, 29, 45, 0.7); --text-white: #f1f5f9;
            --text-muted: #94a3b8; --gold-primary: #dfba6b; --gold-border: rgba(212, 175, 55, 0.3);
            --green-success: #10b981; --border-color: rgba(255, 255, 255, 0.04);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-main); color: var(--text-white); padding-bottom: 60px; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        
        /* Buttons & Cards */
        .btn-small-home { display: inline-flex; align-items: center; gap: 6px; color: var(--text-muted); text-decoration: none; font-size: 13px; font-weight: 600; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-color); padding: 6px 14px; border-radius: 8px; margin-top: 10px; }
        .btn-small-home:hover { border-color: var(--gold-primary); color: white; }
        .premium-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
        .upload-dashed-container { background: var(--bg-card); border: 1px dashed var(--gold-border); border-radius: 16px; padding: 40px; text-align: center; cursor: pointer; }
        
        /* Slider Styling */
        input[type=range] { width: 100%; margin: 15px 0; accent-color: var(--gold-primary); }
        
        .btn-convert-action { background: linear-gradient(90deg, #bf953f, #dfba6b); color: #090d16; border: none; padding: 16px; border-radius: 12px; font-weight: 700; width: 100%; cursor: pointer; }
        .btn-green-download { background: var(--green-success); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 700; width: 100%; margin-bottom: 10px; cursor: pointer; }
        .btn-large-home { background: #161d2d; color: white !important; border: 1px solid var(--border-color); padding: 16px; border-radius: 12px; width: 100%; text-decoration: none; display: flex; justify-content: center; }
        
        .progress-track { background: #0b0f19; border-radius: 20px; height: 10px; overflow: hidden; margin-top: 10px; }
        .progress-thumb-fill { background: linear-gradient(90deg, #b38728, #dfba6b); height: 100%; width: 0%; transition: width 0.3s; }
    </style>
</head>
<body>

    <div class="container">
        <a href="https://pdfgridbox.in" class="btn-small-home">🏠 Back to Home</a>
        
        <h1 style="text-align: center; margin: 20px 0;">Compress PDF</h1>
        
        <div class="upload-dashed-container" onclick="document.getElementById('realPdfFileInput').click()">
            <div style="font-size: 40px;">🗜️</div>
            <p>Choose PDF File</p>
            <input type="file" id="realPdfFileInput" accept=".pdf" style="display: none;" onchange="handleSingleFileImport(event)">
        </div>

        <div class="premium-card">
            <label>Compression Quality: <span id="qualityVal" style="color:var(--gold-primary);">70</span>%</label>
            <input type="range" id="compSlider" min="10" max="100" value="70" oninput="updateVal(this.value)">
            <p style="font-size: 11px; color: var(--text-muted);">Slide towards 100% for high quality (larger file), 10% for max compression.</p>
        </div>

        <div class="premium-card">
            <div id="stateLabel" style="font-size: 13px; font-weight: 600;">Status: Awaiting Document</div>
            <div class="progress-track"><div class="progress-thumb-fill" id="trackBarIndicatorFill"></div></div>
        </div>

        <button class="btn-convert-action" onclick="executePdfCompressionLoop()">Optimize & Compress</button>

        <div id="outputWorkspace" style="display:none; margin-top: 30px;">
            <button class="btn-green-download" onclick="triggerDownload()">📥 Download Compressed PDF</button>
            <a href="https://pdfgridbox.in" class="btn-large-home">🏠 Back to Home</a>
        </div>
    </div>

    <script>
        var pdfjsLib = window['pdfjs-dist/build/pdf'] || pdfjsLib;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let globalFileArrayBuffer = null;
        let compiledBlobUrl = null;

        function updateVal(v) { document.getElementById('qualityVal').innerText = v; }

        function handleSingleFileImport(event) {
            const rawFile = event.target.files[0];
            if (!rawFile) return;
            const reader = new FileReader();
            reader.onload = async function() { globalFileArrayBuffer = this.result; document.getElementById('stateLabel').innerText = "Status: Document Loaded."; };
            reader.readAsArrayBuffer(rawFile);
        }

        async function executePdfCompressionLoop() {
            if (!globalFileArrayBuffer) return alert("Select PDF first.");
            
            const quality = document.getElementById('compSlider').value / 100;
            const labelText = document.getElementById('stateLabel');
            const fillerBar = document.getElementById('trackBarIndicatorFill');
            
            try {
                const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(globalFileArrayBuffer) }).promise;
                const newPdf = await PDFLib.PDFDocument.create();
                
                // Static canvas (FIX: Memory Leak Fixed)
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');

                for (let i = 1; i <= pdf.numPages; i++) {
                    labelText.innerText = `Compressing Page ${i}/${pdf.numPages}...`;
                    fillerBar.style.width = (i / pdf.numPages) * 100 + "%";

                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 1.2 }); // FIXED: Higher scale = sharp text
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;
                    
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    await page.render({ canvasContext: ctx, viewport: viewport }).promise;

                    const jpegData = await new Promise(res => canvas.toBlob(b => res(b), 'image/jpeg', quality));
                    const imgBuffer = await jpegData.arrayBuffer();
                    const embedded = await newPdf.embedJpg(imgBuffer);
                    
                    const newPage = newPdf.addPage({ width: canvas.width, height: canvas.height });
                    newPage.drawImage(embedded, { width: canvas.width, height: canvas.height });
                }

                const pdfBytes = await newPdf.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                compiledBlobUrl = URL.createObjectURL(blob);
                
                labelText.innerText = "Status: Compression Complete!";
                document.getElementById('outputWorkspace').style.display = "block";
            } catch(e) {
                console.error(e);
                alert("Compression error.");
            }
        }

        function triggerDownload() {
            const a = document.createElement('a');
            a.href = compiledBlobUrl;
            a.download = "Compressed_pdfgridbox.pdf";
            a.click();
        }
    </script>
</body>
</html>
